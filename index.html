<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IG Video Downloader Pro</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #667eea, #764ba2);
      --card: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.7);
      --accent: #ff3366;
      --accent-glow: rgba(255,51,102,0.4);
      --border: rgba(255,255,255,0.15);
      --shadow: 0 8px 32px rgba(0,0,0,0.37);
      --glass: rgba(255,255,255,0.06);
    }
    [data-theme="light"] {
      --bg: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      --card: rgba(255,255,255,0.85);
      --text: #1a1a1a;
      --text-muted: #555;
      --accent: #e1306c;
      --accent-glow: rgba(225,48,108,0.25);
      --border: rgba(0,0,0,0.08);
      --glass: rgba(255,255,255,0.75);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      transition: all 0.4s ease;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 40px;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .theme-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    h1 {
      text-align: center;
      font-size: 2.8rem;
      margin: 0 0 8px;
      background: linear-gradient(90deg, var(--accent), #9f7aea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 40px;
    }
    .step {
      background: var(--glass);
      backdrop-filter: blur(12px);
      padding: 28px;
      border-radius: 20px;
      margin: 32px 0;
      border: 1px solid var(--border);
      transition: transform 0.3s;
    }
    .step:hover {
      transform: translateY(-4px);
    }
    .step h3 {
      color: var(--accent);
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.05rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 16px 0;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      transition: all 0.3s;
    }
    [data-theme="light"] input, [data-theme="light"] textarea {
      background: rgba(0,0,0,0.05);
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    textarea {
      min-height: 160px;
      font-family: 'Courier New', monospace;
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin: 24px 0;
    }
    button {
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
    }
    button.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px var(--accent-glow);
    }
    button.secondary {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover {
      background: rgba(255,255,255,0.15);
    }
    #preview {
      max-width: 100%;
      border-radius: 16px;
      margin: 24px auto;
      display: block;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transition: transform 0.4s;
    }
    #preview:hover {
      transform: scale(1.02);
    }
    #result {
      margin-top: 40px;
      padding: 28px;
      background: var(--glass);
      border-radius: 20px;
      border: 1px solid var(--border);
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin: 28px 0;
    }
    .info-item {
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
      transition: all 0.3s;
    }
    .info-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .caption-box {
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 12px;
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 24px 0;
      border: 1px solid var(--border);
    }
    .error {
      color: #ff6b6b;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
    }
    @media (max-width: 768px) {
      .container { padding: 24px; }
      h1 { font-size: 2.2rem; }
      .btn-group { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">
<div class="container">
  <button class="theme-toggle" title="Toggle Theme">🌙</button>

  <h1>IG Video Downloader Pro</h1>
  <p class="subtitle">Fast, secure downloads of public Reels, videos & photos</p>

  <div class="step">
    <h3>1. Enter Instagram URL</h3>
    <input type="text" id="igUrl" placeholder="https://www.instagram.com/reel/ABC123xyz/ ..." />
    <div class="btn-group">
      <button class="primary graph-btn">Generate Link</button>
    </div>
    <div id="generatedLink" style="margin-top:20px; word-break:break-all; font-size:0.95rem;"></div>
    <div id="firstTimeReminder" class="reminder" style="display:none;">
      <strong>Important (first time only):</strong><br>
      After the page loads → press <strong>Ctrl+A</strong> (Cmd+A on Mac) → <strong>Ctrl+C</strong> to copy everything.<br>
      Return here and paste into the next box.
    </div>
  </div>

  <div class="step">
    <h3>2. Paste JSON Response</h3>
    <textarea id="jsonPaste" placeholder="Paste the full JSON from the opened tab..."></textarea>
    <div class="btn-group">
      <button class="primary">Process & Download</button>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
  // Theme toggle & persistence
  const toggleBtn = document.querySelector('.theme-toggle');
  toggleBtn.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    toggleBtn.textContent = next === 'dark' ? '☀️' : '🌙';
  });

  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.body.setAttribute('data-theme', savedTheme);
  toggleBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

  let hasShownReminder = false;

  function extractShortcode(url) {
    const regex = /(?:\/(reel|reels|p|tv)\/)([A-Za-z0-9_-]+)/i;
    const match = url.match(regex);
    return match ? match[2] : null;
  }

  document.querySelector('.graph-btn').addEventListener('click', () => {
    const url = document.getElementById('igUrl').value.trim();
    const linkEl = document.getElementById('generatedLink');

    if (!url) return alert('Please enter a valid Instagram URL');

    const shortcode = extractShortcode(url);
    if (!shortcode) return alert('Shortcode not found – check URL format');

    const graphql = `https://www.instagram.com/graphql/query/?doc_id=8845758582119845&variables=%7B%22shortcode%22%3A%22${shortcode}%22%2C%22fetch_tagged_user_count%22%3Anull%2C%22hoisted_comment_id%22%3Anull%2C%22hoisted_reply_id%22%3Anull%7D`;

    linkEl.innerHTML = `
      <strong>GraphQL Link (click to open):</strong><br>
      <a href="${graphql}" target="_blank" style="color:var(--accent); text-decoration:underline; word-break:break-all;">
        ${graphql}
      </a>
      <br><small>(After opening → Ctrl+A → Ctrl+C → paste below)</small>
    `;

    if (!hasShownReminder) {
      document.getElementById('firstTimeReminder').style.display = 'block';
      hasShownReminder = true;
    }
  });

  document.querySelector('.step button:last-child').addEventListener('click', () => {
    const text = document.getElementById('jsonPaste').value.trim();
    const result = document.getElementById('result');
    result.innerHTML = '';

    if (!text) {
      result.innerHTML = '<p class="error">Please paste JSON content first</p>';
      return;
    }

    try {
      const data = JSON.parse(text);
      const media = data?.data?.xdt_shortcode_media;

      if (!media) throw new Error('No media data found');

      const isVideo = !!media.video_url;
      const mediaUrl = media.video_url || media.display_url || media.thumbnail_src || '';
      const thumbUrl = media.thumbnail_src || media.display_url || '';
      const caption = media.edge_media_to_caption?.edges?.[0]?.node?.text || 'No caption';
      const username = media.owner?.username || 'Unknown';
      const views = media.video_view_count || '—';
      const plays = media.video_play_count || '—';
      const duration = media.video_duration ? Math.floor(media.video_duration) + 's' : '—';
      const shortcode = media.shortcode || '—';

      const mediaInfo = document.createElement('div');
      mediaInfo.className = 'info-grid';
      mediaInfo.innerHTML = `
        <div class="info-item"><strong>By</strong><br>@${username}</div>
        <div class="info-item"><strong>Shortcode</strong><br>${shortcode}</div>
        <div class="info-item"><strong>Views / Plays</strong><br>${views} / ${plays}</div>
        <div class="info-item"><strong>Duration</strong><br>${duration}</div>
      `;
      result.appendChild(mediaInfo);

      if (thumbUrl) {
        const previewDiv = document.createElement('div');
        previewDiv.style.textAlign = 'center';
        previewDiv.style.margin = '32px 0';

        const img = document.createElement('img');
        img.id = 'preview';
        img.src = thumbUrl;
        img.alt = 'Preview';
        previewDiv.appendChild(img);

        const thumbBtn = document.createElement('button');
        thumbBtn.className = 'secondary';
        thumbBtn.textContent = 'Download Thumbnail';
        thumbBtn.addEventListener('click', () => {
          const a = document.createElement('a');
          a.href = thumbUrl;
          a.download = `thumb_${shortcode}.jpg`;
          a.click();
        });
        previewDiv.appendChild(thumbBtn);

        result.appendChild(previewDiv);
      } else {
        const noThumb = document.createElement('p');
        noThumb.style.textAlign = 'center';
        noThumb.style.color = 'var(--text-muted)';
        noThumb.textContent = 'No thumbnail available';
        result.appendChild(noThumb);
      }

      const captionBox = document.createElement('div');
      captionBox.className = 'caption-box';
      captionBox.id = 'captionText';
      captionBox.textContent = caption;
      result.appendChild(captionBox);

      const btnGroup = document.createElement('div');
      btnGroup.className = 'btn-group';
      btnGroup.style.marginTop = '32px';

      if (mediaUrl) {
        const dlBtn = document.createElement('button');
        dlBtn.className = 'primary';
        dlBtn.textContent = `Download ${isVideo ? 'Video' : 'Photo'}`;
        dlBtn.addEventListener('click', () => {
          const a = document.createElement('a');
          a.href = mediaUrl;
          a.download = `${isVideo ? 'reel' : 'post'}_${shortcode}.${isVideo ? 'mp4' : 'jpg'}`;
          a.click();
        });
        btnGroup.appendChild(dlBtn);
      }

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'Copy Caption';
      copyBtn.addEventListener('click', () => {
        const captionText = document.getElementById('captionText').textContent;
        navigator.clipboard.writeText(captionText).then(() => {
          alert('Caption copied to clipboard!');
        }).catch(() => alert('Copy failed – select manually'));
      });
      btnGroup.appendChild(copyBtn);

      result.appendChild(btnGroup);

      result.style.display = 'block';

    } catch (err) {
      const errP = document.createElement('p');
      errP.className = 'error';
      errP.textContent = `Processing failed: ${err.message}`;
      result.appendChild(errP);
    }
  });

  // Auto-fill from extension query param
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const igUrl = params.get('url');
    if (igUrl) {
      const input = document.getElementById('igUrl');
      if (input) {
        input.value = decodeURIComponent(igUrl);
        const generateBtn = document.querySelector('.graph-btn');
        if (generateBtn) {
          setTimeout(() => generateBtn.click(), 400);
        }
      }
    }
  });
</script>
</body>
</html>
